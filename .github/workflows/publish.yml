name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint
        run: deno lint

      # Provenance requires a GitHub OIDC token. The `id-token: write` permission
      # above is what injects ACTIONS_ID_TOKEN_REQUEST_URL/_TOKEN into the runner.
      # If they are absent here despite the permission, an org/enterprise Actions
      # OIDC policy is blocking the token and `deno publish` will silently skip
      # provenance (publish still succeeds). This makes that failure mode visible.
      - name: Check OIDC availability (provenance prerequisite)
        run: |
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] && [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC token endpoint available — provenance prerequisites met."
          else
            echo "::warning::OIDC token NOT available (URL present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}, TOKEN present: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}). deno publish will skip provenance. Verify id-token:write is honored — check org/enterprise Settings → Actions → General OIDC policy."
          fi

      - name: Publish to JSR
        run: deno publish

      - name: Create release branch
        run: |
          git checkout -b release/${GITHUB_REF_NAME}
          git push origin release/${GITHUB_REF_NAME}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${GITHUB_REF_NAME} \
            --title "${GITHUB_REF_NAME}" \
            --target release/${GITHUB_REF_NAME} \
            --generate-notes
